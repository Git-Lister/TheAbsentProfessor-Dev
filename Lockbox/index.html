<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Professor's Lockbox</title>
  <style>
    * {
      box-sizing: border-box;
      user-select: none; /* Avoid accidental text selection on buttons */
    }
    body {
      background: linear-gradient(135deg, #2e3b3e 0%, #1a1f1f 100%);
      font-family: 'Segoe UI', 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      padding: 20px;
    }
    .lockbox {
      background: #4a3b2c;
      background-image: radial-gradient(circle at 25% 40%, rgba(0,0,0,0.2) 2%, transparent 2.5%);
      background-size: 12px 12px;
      border-radius: 40px 40px 30px 30px;
      box-shadow: 0 20px 30px rgba(0,0,0,0.5), inset 0 1px 4px rgba(255,255,200,0.3);
      padding: 25px 20px 20px;
      width: 100%;
      max-width: 450px;
      transition: all 0.2s;
    }
    /* Lock face */
    .lock-face {
      background: #2c241a;
      border-radius: 30px;
      padding: 20px 15px 25px;
      box-shadow: inset 0 0 0 2px #6b5a44, inset 0 0 0 4px #3e3224, 0 5px 10px rgba(0,0,0,0.3);
    }
    h1 {
      text-align: center;
      font-size: 1.6rem;
      margin: 0 0 10px 0;
      color: #f7e9c3;
      text-shadow: 2px 2px 0 #3a2a1c;
      letter-spacing: 2px;
      word-break: keep-all;
    }
    .sub {
      text-align: center;
      color: #c9b27c;
      font-size: 0.8rem;
      margin-top: -8px;
      margin-bottom: 20px;
      font-style: italic;
    }
    /* Team input */
    .team-input {
      background: #fdf8ec;
      border-radius: 40px;
      padding: 8px 15px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .team-input label {
      font-weight: bold;
      color: #4a2c1a;
      font-size: 0.9rem;
    }
    .team-input input {
      flex: 1;
      background: #fff;
      border: 2px solid #b5926a;
      border-radius: 30px;
      padding: 8px 12px;
      font-size: 1rem;
      font-family: monospace;
      outline: none;
      transition: 0.1s;
    }
    .team-input input:focus {
      border-color: #d9a13b;
      box-shadow: 0 0 0 2px rgba(217,161,59,0.4);
    }
    /* Code display */
    .code-display {
      background: #1e1b16;
      border-radius: 20px;
      padding: 12px;
      margin-bottom: 20px;
      text-align: center;
      font-family: 'Courier New', monospace;
      font-size: 2.8rem;
      letter-spacing: 8px;
      color: #6ef0b0;
      text-shadow: 0 0 3px #00aa55;
      background: #0f0e0b;
      border: 1px solid #4a3b2c;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
      word-break: break-all;
    }
    /* Keypad grid */
    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    .key {
      background: #2f2a24;
      background: linear-gradient(145deg, #3a3228, #2a221c);
      border: none;
      border-radius: 50px;
      font-size: 2rem;
      font-weight: bold;
      color: #ffecb3;
      padding: 12px 0;
      cursor: pointer;
      box-shadow: 0 5px 0 #14100c;
      transition: 0.05s linear;
      font-family: monospace;
      text-align: center;
    }
    .key:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #14100c;
    }
    .key.clear {
      background: #5f3f2c;
      color: #ffccaa;
      font-size: 1.2rem;
    }
    .key.enter {
      background: #3c6e47;
      color: white;
      font-size: 1.2rem;
    }
    .key.disabled {
      opacity: 0.6;
      transform: none;
      pointer-events: none;
      filter: grayscale(0.1);
    }
    .message {
      background: #000000aa;
      backdrop-filter: blur(4px);
      border-radius: 50px;
      padding: 10px;
      text-align: center;
      font-weight: bold;
      color: #ffe0aa;
      margin-top: 10px;
      transition: 0.2s;
      min-height: 70px;
    }
    .shake {
      animation: shake 0.3s ease-in-out 0s 2;
      background-color: #8b3a3a;
    }
    @keyframes shake {
      0%,100%{ transform: translateX(0); }
      25%{ transform: translateX(-6px); }
      75%{ transform: translateX(6px); }
    }
    .success {
      background: #2b6e3c;
      color: white;
      box-shadow: 0 0 10px #7eff7e;
    }
    .admin-btn {
      text-align: center;
      margin-top: 20px;
      font-size: 0.7rem;
      color: #ad9e7c;
      cursor: pointer;
    }
    .admin-panel {
      background: #2a241ecc;
      backdrop-filter: blur(8px);
      border-radius: 20px;
      padding: 15px;
      margin-top: 15px;
      font-size: 0.8rem;
      color: #f0e0b0;
      max-height: 300px;
      overflow-y: auto;
      display: none;
    }
    .admin-panel h4 {
      margin: 0 0 8px 0;
    }
    .admin-panel ul {
      margin: 0;
      padding-left: 20px;
    }
    .admin-panel li {
      margin-bottom: 5px;
      font-family: monospace;
    }
    button {
      background: #ad8b60;
      border: none;
      border-radius: 30px;
      padding: 4px 12px;
      color: #2c241a;
      font-weight: bold;
      cursor: pointer;
    }
    @media (max-width: 480px) {
      .key { font-size: 1.6rem; padding: 8px 0; }
      .code-display { font-size: 2rem; letter-spacing: 4px; }
      .team-input input { width: 100%; }
    }
  </style>
</head>
<body>
<div class="lockbox" id="lockbox">
  <div class="lock-face">
    <h1>🔒 PROFESSOR'S LOCKBOX</h1>
    <div class="sub">enter the 4‑digit code</div>

    <div class="team-input">
      <label>📋 TEAM:</label>
      <input type="text" id="teamName" placeholder="e.g., Brainy Bunch" autocomplete="off">
    </div>

    <div class="code-display" id="codeDisplay">____</div>

    <div class="keypad" id="keypad">
      <!-- digits 1-9, 0, clear, enter will be generated by JS for easier maintenance -->
    </div>

    <div class="message" id="message">
      🔐 Ready for the code.
    </div>

    <div class="admin-btn" id="adminToggle">🔧 Show submissions (admin)</div>
    <div class="admin-panel" id="adminPanel">
      <h4>✅ Successful unlocks (local storage)</h4>
      <div id="submissionList">No submissions yet.</div>
      <button id="exportSubmissions">📤 Export as JSON</button>
      <button id="clearSubmissions" style="background:#754c3c;">🗑️ Clear all</button>
    </div>
  </div>
</div>

<script>
  // ========== CONFIGURATION ==========
  const CORRECT_CODE = "2025";   // <-- CHANGE THIS to the actual code from puzzles
  // ===================================

  let currentCode = "";          // digits entered so far
  let locked = false;            // if true, prevent further attempts (after correct code)
  let teamSolved = false;        // track if this team already solved in this session (by localStorage)

  // DOM elements
  const teamInput = document.getElementById("teamName");
  const codeDisplay = document.getElementById("codeDisplay");
  const messageDiv = document.getElementById("message");
  const keypadContainer = document.getElementById("keypad");
  const adminPanel = document.getElementById("adminPanel");
  const adminToggle = document.getElementById("adminToggle");
  const submissionListDiv = document.getElementById("submissionList");
  const exportBtn = document.getElementById("exportSubmissions");
  const clearSubmissionsBtn = document.getElementById("clearSubmissions");

  // Helper: load submissions from localStorage
  function loadSubmissions() {
    const raw = localStorage.getItem("lockbox_submissions");
    if (!raw) return [];
    try {
      return JSON.parse(raw);
    } catch(e) {
      return [];
    }
  }

  // Helper: save submissions array
  function saveSubmissions(submissions) {
    localStorage.setItem("lockbox_submissions", JSON.stringify(submissions));
  }

  // Add a new successful unlock
  function addSubmission(team, codeEntered) {
    const submissions = loadSubmissions();
    // avoid duplicate if same team already unlocked? we'll allow multiple but prevent if already exists? Let's prevent duplicate team.
    const existing = submissions.find(s => s.team.toLowerCase() === team.toLowerCase());
    if (existing) {
      messageDiv.innerHTML = "⚠️ This team has already unlocked the lockbox!";
      return false;
    }
    const newEntry = {
      team: team.trim(),
      timestamp: new Date().toISOString(),
      codeEntered: codeEntered
    };
    submissions.push(newEntry);
    saveSubmissions(submissions);
    updateAdminPanel();
    return true;
  }

  // Update the admin panel content
  function updateAdminPanel() {
    const submissions = loadSubmissions();
    if (submissions.length === 0) {
      submissionListDiv.innerHTML = "No submissions yet.";
      return;
    }
    const ul = document.createElement("ul");
    submissions.forEach(s => {
      const li = document.createElement("li");
      const date = new Date(s.timestamp).toLocaleString();
      li.textContent = `${s.team} – ${date} (code: ${s.codeEntered})`;
      ul.appendChild(li);
    });
    submissionListDiv.innerHTML = "";
    submissionListDiv.appendChild(ul);
  }

  // Export submissions as downloadable JSON
  function exportSubmissions() {
    const submissions = loadSubmissions();
    const dataStr = JSON.stringify(submissions, null, 2);
    const blob = new Blob([dataStr], {type: "application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `lockbox_submissions_${new Date().toISOString().slice(0,19)}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    messageDiv.innerHTML = "📥 Submissions exported!";
    setTimeout(() => {
      if (!locked && !teamSolved) messageDiv.innerHTML = "🔐 Ready for the code.";
    }, 2000);
  }

  // Clear all submissions
  function clearAllSubmissions() {
    if (confirm("⚠️ Permanently delete all recorded unlocks?")) {
      localStorage.removeItem("lockbox_submissions");
      updateAdminPanel();
      messageDiv.innerHTML = "🗑️ Submissions cleared.";
      setTimeout(() => {
        if (!locked && !teamSolved) messageDiv.innerHTML = "🔐 Ready for the code.";
      }, 2000);
    }
  }

  // Update the code display and check length
  function updateDisplay() {
    const padded = currentCode.padEnd(4, "_").slice(0,4);
    codeDisplay.innerText = padded.split('').join(' ');
  }

  // Clear current entry
  function clearEntry() {
    if (locked) return;
    currentCode = "";
    updateDisplay();
    messageDiv.innerHTML = "🔐 Code cleared.";
    messageDiv.classList.remove("shake", "success");
    setTimeout(() => {
      if (!locked && !teamSolved) messageDiv.innerHTML = "🔐 Ready for the code.";
    }, 1000);
  }

  // Attempt to unlock
  function attemptUnlock() {
    if (locked) {
      messageDiv.innerHTML = "🔒 Already unlocked! Grades revealed.";
      return;
    }
    const team = teamInput.value.trim();
    if (team === "") {
      messageDiv.innerHTML = "⚠️ Please enter your team name first!";
      messageDiv.classList.add("shake");
      setTimeout(() => messageDiv.classList.remove("shake"), 400);
      return;
    }
    if (currentCode.length !== 4) {
      messageDiv.innerHTML = "❌ Enter exactly 4 digits.";
      messageDiv.classList.add("shake");
      setTimeout(() => messageDiv.classList.remove("shake"), 400);
      return;
    }

    if (currentCode === CORRECT_CODE) {
      // CORRECT!
      const added = addSubmission(team, currentCode);
      if (!added) {
        // team already exists in records
        return;
      }
      locked = true;
      teamSolved = true;
      messageDiv.innerHTML = "🎉✅ LOCK OPEN! Grades unlocked! ✅🎉";
      messageDiv.classList.add("success");
      // disable keypad visually
      document.querySelectorAll(".key").forEach(k => k.classList.add("disabled"));
      // also disable team input
      teamInput.disabled = true;
      // play optional success sound (optional)
      // you could add a simple audio beep if you want
    } else {
      // Wrong code
      messageDiv.innerHTML = "🔒❌ Wrong code! Lock doesn't open. Try again.";
      messageDiv.classList.add("shake");
      setTimeout(() => messageDiv.classList.remove("shake"), 500);
      // clear the code entry for next attempt (optional, but improves UX)
      currentCode = "";
      updateDisplay();
    }
  }

  // Append digit to current code (max 4)
  function appendDigit(digit) {
    if (locked) return;
    if (currentCode.length < 4) {
      currentCode += digit;
      updateDisplay();
      // Auto-submit when 4 digits? We'll let the user press Enter explicitly, but we could add auto-submit.
      // For better UX, if 4 digits are entered, we could auto-submit.
      if (currentCode.length === 4) {
        attemptUnlock();
      }
    } else {
      // Already full: maybe show a little feedback
      messageDiv.innerHTML = "⚠️ Code full. Press ENTER or CLEAR.";
      setTimeout(() => {
        if (!locked && !teamSolved) messageDiv.innerHTML = "🔐 Ready for the code.";
      }, 800);
    }
  }

  // Build keypad
  function buildKeypad() {
    const layout = [
      "1","2","3",
      "4","5","6",
      "7","8","9",
      "C","0","E"
    ];
    keypadContainer.innerHTML = "";
    layout.forEach(key => {
      const btn = document.createElement("button");
      btn.classList.add("key");
      if (key === "C") {
        btn.textContent = "⌫ CLEAR";
        btn.classList.add("clear");
        btn.onclick = () => clearEntry();
      } else if (key === "E") {
        btn.textContent = "⏎ ENTER";
        btn.classList.add("enter");
        btn.onclick = () => attemptUnlock();
      } else {
        btn.textContent = key;
        btn.onclick = () => appendDigit(key);
      }
      keypadContainer.appendChild(btn);
    });
  }

  // Check if current team already unlocked (on page load) and lock if so
  function checkExistingTeamUnlock() {
    const currentTeam = teamInput.value.trim();
    if (!currentTeam) return false;
    const submissions = loadSubmissions();
    const already = submissions.some(s => s.team.toLowerCase() === currentTeam.toLowerCase());
    if (already) {
      locked = true;
      teamSolved = true;
      teamInput.disabled = true;
      messageDiv.innerHTML = "🔓 This team already unlocked the lockbox! (from previous session)";
      messageDiv.classList.add("success");
      document.querySelectorAll(".key").forEach(k => k.classList.add("disabled"));
      return true;
    }
    return false;
  }

  // When team name changes, re-evaluate if that team already unlocked
  teamInput.addEventListener("input", () => {
    if (locked) return;
    // reset locked state if team changes and wasn't solved in current session
    const currentTeam = teamInput.value.trim();
    const submissions = loadSubmissions();
    const alreadyExists = submissions.some(s => s.team.toLowerCase() === currentTeam.toLowerCase());
    if (alreadyExists) {
      locked = true;
      teamSolved = true;
      teamInput.disabled = true;
      messageDiv.innerHTML = "🔓 This team already unlocked previously. Grades are accessible.";
      messageDiv.classList.add("success");
      document.querySelectorAll(".key").forEach(k => k.classList.add("disabled"));
    } else {
      // if previously locked but team changed and new team not in list, unlock UI
      if (locked && !alreadyExists && teamInput.value.trim() !== "") {
        // special case: maybe they cleared the team? we'll reset lock status only if new team not in submissions
        // but careful: if they already solved in this session we keep locked.
        if (!teamSolved) {
          locked = false;
          teamInput.disabled = false;
          messageDiv.innerHTML = "🔐 Ready for the code.";
          messageDiv.classList.remove("success");
          document.querySelectorAll(".key").forEach(k => k.classList.remove("disabled"));
          currentCode = "";
          updateDisplay();
        }
      }
    }
  });

  // Admin panel toggle
  adminToggle.addEventListener("click", () => {
    if (adminPanel.style.display === "none" || adminPanel.style.display === "") {
      adminPanel.style.display = "block";
      updateAdminPanel();
    } else {
      adminPanel.style.display = "none";
    }
  });

  exportBtn.addEventListener("click", exportSubmissions);
  clearSubmissionsBtn.addEventListener("click", clearAllSubmissions);

  // Initialization
  function init() {
    buildKeypad();
    updateDisplay();
    // preload admin panel but hidden
    adminPanel.style.display = "none";
    updateAdminPanel();
    // check if there's already a team saved? Not automatic, we wait for team name.
    teamInput.value = "";
    locked = false;
    teamSolved = false;
    teamInput.disabled = false;
    currentCode = "";
    updateDisplay();
    messageDiv.innerHTML = "🔐 Ready for the code.";
    messageDiv.classList.remove("success", "shake");
  }

  init();
</script>
</body>
</html>
