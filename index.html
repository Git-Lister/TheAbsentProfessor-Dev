<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>The Case of the Absent Professor</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
</head>
<body>
<!-- New & improved Team Entry Screen -->
<div id="teamEntryScreen" class="team-entry-overlay">
    <!-- Background layers -->
    <div class="title-bg-image"></div>
    <div class="dark-overlay"></div>

    <!-- University branding – outside the card, fixed at top -->
    <div class="uni-header">
        <div class="uni-name">Manchester Metropolitan University</div>
        <img src="images/mmu-logo.png" alt="MMU Logo" class="uni-logo">
    </div>

    <!-- Centered content card (no logo inside) -->
    <div class="team-entry-card">
        <div class="game-title-hero">Library Unlocked</div>
        <div class="game-subtitle">The Case of the Absent Professor</div>
        <p class="entry-instruction">Enter your team name to begin:</p>
        <input type="text" id="initialTeamName" placeholder="e.g., Brainy Bunch" autocomplete="off">
        <button id="startGameBtn">Start Quest</button>
    </div>
</div>

    <!-- Main game UI (hidden until team name is set) -->
    <div id="mainGameUI" style="display: none;">
        <div class="game-container">
            <header>
                <h1>The Case of the Absent Professor</h1>
                <div class="team-info">
                    Team: <span id="displayTeamName"></span>
                    <button id="resetGameBtn" class="reset-btn">⟳ Reset Game</button>
                </div>
            </header>

            <div class="puzzles-grid" id="puzzlesGrid">
                <!-- Puzzle cards injected here -->
            </div>

            <div class="lockbox-section" id="lockboxSection">
                <h2>Professor's Lockbox</h2>
                <div class="lootbox-container" id="lockboxContainer">
                    <!-- Dynamic lockbox content -->
                </div>
            </div>
        </div>
    </div>

    <div id="modalOverlay" class="modal-overlay" style="display: none;">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/reporting.js"></script>
    <script src="js/puzzles.js"></script>
    <script src="js/lockbox.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
