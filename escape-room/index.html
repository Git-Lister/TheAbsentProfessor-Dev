<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>The Case of the Absent Professor</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Team name entry screen -->
    <div id="teamEntryScreen" class="team-entry-overlay">
        <div class="team-entry-card">
            <h1>The Case of the Absent Professor</h1>
            <p>Enter your team name to begin:</p>
            <input type="text" id="initialTeamName" placeholder="e.g., Brainy Bunch" autocomplete="off">
            <button id="startGameBtn">Start Quest</button>
        </div>
    </div>

    <!-- Main game UI (hidden until team name is set) -->
    <div id="mainGameUI" style="display: none;">
        <div class="game-container">
            <header>
                <h1>The Case of the Absent Professor</h1>
                <div class="team-info">
                    Team: <span id="displayTeamName"></span>
                    <button id="resetGameBtn" class="reset-btn">⟳ Reset Game</button>
                </div>
            </header>

            <div class="puzzles-grid" id="puzzlesGrid">
                <!-- Puzzle cards injected here -->
            </div>

            <div class="lockbox-section" id="lockboxSection" style="display: none;">
                <h2>Professor's Lockbox</h2>
                <div class="lootbox-container" id="lockboxContainer">
                    <!-- Dynamic lockbox content -->
                </div>
            </div>
        </div>
    </div>

    <div id="modalOverlay" class="modal-overlay" style="display: none;">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/reporting.js"></script>
    <script src="js/puzzles.js"></script>
    <script src="js/lockbox.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
