<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background transparent -->
  <rect width="100" height="100" fill="transparent"/>
  
  <!-- Lock body -->
  <rect x="30" y="45" width="40" height="35" rx="6" fill="#d4af37" stroke="#2d5a3a" stroke-width="2"/>
  
  <!-- Lock shackle (U-shape) -->
  <path d="M 45 45 V 35 A 5 5 0 0 1 55 35 V 45" fill="none" stroke="#d4af37" stroke-width="5" stroke-linecap="round"/>
  
  <!-- Keyhole -->
  <circle cx="50" cy="60" r="4" fill="#2d5a3a"/>
  <rect x="48" y="60" width="4" height="8" rx="1" fill="#2d5a3a"/>
  
  <!-- Professor top hat (sitting on the lock) -->
  <rect x="38" y="22" width="24" height="18" rx="2" fill="#2d5a3a" stroke="#d4af37" stroke-width="1.5"/>
  <rect x="34" y="38" width="32" height="6" rx="2" fill="#2d5a3a" stroke="#d4af37" stroke-width="1.5"/>
  
  <!-- Subtle leaf (Amazonian plant) emerging from keyhole -->
  <path d="M 50 60 Q 55 50 62 45 Q 56 52 50 60" fill="#00C1D3" opacity="0.85"/>
  <path d="M 50 60 Q 45 50 38 45 Q 44 52 50 60" fill="#00C1D3" opacity="0.85"/>
</svg>